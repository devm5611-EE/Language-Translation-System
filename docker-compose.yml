version: '3.8'

services:
  # Flask Application
  app:
    build: .
    container_name: linguaflow_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - MONGODB_URI=${MONGODB_URI}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - FLASK_DEBUG=False
    depends_on:
      - mongo
      - redis
    networks:
      - linguaflow_network
    volumes:
      - ./linguaflow/logs:/app/linguaflow/logs

  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: linguaflow_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
      - MONGO_INITDB_DATABASE=linguaflow
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - linguaflow_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: linguaflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - linguaflow_network

  # Mongo Express (Optional - for database management UI)
  mongo-express:
    image: mongo-express:latest
    container_name: linguaflow_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=admin123
      - ME_CONFIG_MONGODB_URL=mongodb://admin:admin123@mongo:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      - mongo
    networks:
      - linguaflow_network

networks:
  linguaflow_network:
    driver: bridge

volumes:
  mongo_data:
  mongo_config:
  redis_data:
