services:
  - type: web
    name: linguaflow
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r linguaflow/requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --worker-class sync --timeout 120 --preload --log-level info wsgi:application
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: FLASK_DEBUG
        value: False
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://linguaflow.onrender.com,http://localhost:3000,http://localhost:5000
      - key: ADMIN_EMAIL
        value: admin@linguaflow.com
      - key: JWT_EXPIRY_HOURS
        value: 24
      - key: MAX_TEXT_LENGTH
        value: 5000
